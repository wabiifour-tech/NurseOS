<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B1A2B"/>
      <stop offset="100%" stop-color="#0E2A3D"/>
    </linearGradient>
    <linearGradient id="tealG" x1="130" y1="110" x2="382" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <linearGradient id="pulseG" x1="185" y1="0" x2="327" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5EEAD4"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#5EEAD4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0D9488" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  
  <!-- Very subtle inner glow ring -->
  <rect x="6" y="6" width="500" height="500" rx="106" fill="none" stroke="#14B8A6" stroke-opacity="0.08" stroke-width="1.5"/>

  <!-- =============================== -->
  <!-- THE MARK: "N" with heartbeat    -->
  <!--                                 -->
  <!-- Concept: The letter N where the -->
  <!-- diagonal stroke contains an     -->
  <!-- ECG heartbeat peak - symbolizing-->
  <!-- nursing + technology + life     -->
  <!-- =============================== -->

  <g filter="url(#softShadow)">
    <!-- Left vertical of N -->
    <rect x="132" y="112" width="26" height="288" rx="13" fill="url(#tealG)"/>
    
    <!-- Right vertical of N -->
    <rect x="354" y="112" width="26" height="288" rx="13" fill="url(#tealG)"/>
    
    <!-- Diagonal of N with heartbeat pulse integrated -->
    <!-- Goes from top-left to bottom-right with ECG peaks in the middle -->
    <path d="
      M 145 125
      L 232 232
      L 244 232
      L 258 168
      L 278 328
      L 296 240
      L 308 240
      L 367 387
    " stroke="url(#tealG)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Bright highlight on the heartbeat peaks - the "life" in the system -->
  <path d="
    M 244 232
    L 258 168
    L 278 328
    L 296 240
  " stroke="url(#pulseG)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)" opacity="0.85"/>

  <!-- Tiny bright dots at pulse peaks for clinical precision feel -->
  <circle cx="258" cy="168" r="3.5" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="278" cy="328" r="3.5" fill="#FFFFFF" opacity="0.75"/>

  <!-- =============================== -->
  <!-- Floating pulse extensions        -->
  <!-- Shows the system is alive        -->
  <!-- =============================== -->
  
  <!-- Left side subtle pulse -->
  <path d="M 90 328 L 115 328 L 128 290 L 140 350 L 152 312 L 165 328 L 200 328" 
        stroke="#5EEAD4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.3"/>
  
  <!-- Right side subtle pulse -->
  <path d="M 312 328 L 348 328 L 360 290 L 372 350 L 384 312 L 396 328 L 422 328" 
        stroke="#5EEAD4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.3"/>

  <!-- =============================== -->
  <!-- Corner brackets - tech accents   -->
  <!-- =============================== -->
  <path d="M 52 72 L 52 52 L 72 52" stroke="#14B8A6" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.25"/>
  <path d="M 440 52 L 460 52 L 460 72" stroke="#14B8A6" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.25"/>
  <path d="M 52 440 L 52 460 L 72 460" stroke="#14B8A6" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.25"/>
  <path d="M 440 460 L 460 460 L 460 440" stroke="#14B8A6" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.25"/>
</svg>
